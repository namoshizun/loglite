name: Build cpp-base image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/loglite-cpp-base

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            base_image: quay.io/pypa/manylinux_2_28_x86_64:latest
            tag_suffix: amd64
          - platform: linux/arm64
            base_image: quay.io/pypa/manylinux_2_28_aarch64:latest
            tag_suffix: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cpp
          file: dockerfiles/Dockerfile.linux.base
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: ${{ env.IMAGE }}:latest-${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=cpp-base-${{ matrix.tag_suffix }}
          cache-to: type=gha,scope=cpp-base-${{ matrix.tag_suffix }},mode=max

  manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-arch manifest (:latest)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:latest-amd64 \
            ${{ env.IMAGE }}:latest-arm64
