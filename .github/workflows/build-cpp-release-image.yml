name: Build cpp-release image

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/loglite-cpp:${{ github.ref_name }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: cpp
          file: dockerfiles/Dockerfile.linux.release
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ env.IMAGE }}-${{ matrix.arch }}
          outputs: type=docker,dest=image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.arch }}
          path: image.tar

  extract-binaries:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.arch }}

      - name: Extract binary
        run: |
          docker load -i image.tar
          cid=$(docker create ${{ env.IMAGE }}-${{ matrix.arch }})
          docker cp $cid:/usr/local/bin/loglite loglite-${{ matrix.arch }}
          docker rm $cid

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: loglite-${{ matrix.arch }}-${{ github.ref_name }}
          path: loglite-${{ matrix.arch }}

  merge-manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download image tars
        uses: actions/download-artifact@v4
        with:
          pattern: image-*
          path: images

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push platform images and create manifest
        run: |
          docker load -i images/image-amd64/image.tar
          docker load -i images/image-arm64/image.tar
          docker push ${{ env.IMAGE }}-amd64
          docker push ${{ env.IMAGE }}-arm64
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }} \
            ${{ env.IMAGE }}-amd64 \
            ${{ env.IMAGE }}-arm64
