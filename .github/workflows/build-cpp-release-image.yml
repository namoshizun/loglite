name: Build cpp-release image

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build cpp-base image"]
    types: [completed]

env:
  BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/loglite-cpp-base:latest
  IMAGE: ghcr.io/${{ github.repository_owner }}/loglite-cpp:latest

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cpp
          file: cpp/Dockerfile.linux.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
