name: Build Python Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "py/**"
      - "cpp/**"
      - ".github/workflows/build-python-wheels.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            cibw_arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
            cibw_arch: aarch64
          - os: macos-14
            arch: arm64
            cibw_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel>=2.20

      - name: Build wheels
        working-directory: py
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          # manylinux and musllinux on Linux; default wheels on macOS
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
          CIBW_MUSLLINUX_AARCH64_IMAGE: musllinux_1_2
          # Install Conan and build deps inside the wheel build environment
          CIBW_BEFORE_ALL: >
            pip install conan &&
            conan profile detect --force &&
            conan install ../cpp
            -o with_python=True
            -o with_tests=False
            --build=missing
            -s build_type=Release
            --output-folder={project}
          CIBW_CMAKE_ARGS: >
            -DCMAKE_TOOLCHAIN_FILE={project}/conan_toolchain.cmake
            -DLOGLITE_PYTHON=ON
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: py/wheelhouse/*.whl

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # for trusted PyPI publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
