name: Build Python Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "py/**"
      - "cpp/**"
      - ".github/workflows/build-python-wheels.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            cibw_arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
            cibw_arch: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.1

      - name: Build wheels
        working-directory: py
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/namoshizun/loglite-cpp-base:latest
          CIBW_MANYLINUX_AARCH64_IMAGE: ghcr.io/namoshizun/loglite-cpp-base:latest
          CIBW_CMAKE_ARGS: -DLOGLITE_PYTHON=ON
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: py/wheelhouse/*.whl

