name: C++ Lint

on:
  push:
    branches: [main]
    paths:
      - "cpp/src/**"
      - "cpp/tests/**"
  pull_request:
    branches: [main]
    paths:
      - "cpp/src/**"
      - "cpp/tests/**"

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check formatting
        uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: "22"
          check-path: cpp
