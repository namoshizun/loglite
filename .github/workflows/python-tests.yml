name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - "py/**"
      - "cpp/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "py/**"
      - "cpp/**"
      - ".github/workflows/python-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      UV_PYTHON: ${{ matrix.python-version }}
      UV_NO_PROGRESS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install test deps directly without building the C++ extension.
      # _core is mocked by py/tests/conftest.py when the compiled module is absent.
      - name: Install dependencies
        run: |
          pip install \
            pytest pytest-asyncio pytest-cov \
            aiofiles orjson loguru typer pyzmq

      - name: Run tests
        working-directory: py
        env:
          PYTHONPATH: ${{ github.workspace }}/py
        run: python -m pytest --cov=loglite --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: py/coverage.xml
          flags: python,py-${{ matrix.python-version }}
          fail_ci_if_error: false
