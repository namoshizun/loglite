name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - "py/loglite/**"
      - "py/tests/**"
      - "py/pyproject.toml"
      - "cpp/src/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "py/loglite/**"
      - "py/tests/**"
      - "py/pyproject.toml"
      - "cpp/src/**"
      - ".github/workflows/python-tests.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        runner: [ubuntu-24.04, ubuntu-24.04-arm]

    runs-on: ${{ matrix.runner }}

    container:
      image: ghcr.io/namoshizun/loglite-cpp-base:latest

    env:
      HOME: /root
      UV_NO_PROGRESS: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Sync deps and run tests
        working-directory: py
        run: |
          uv sync -p python${{ matrix.python-version }} --no-dev --group test --extra zmq
          uv run -p python${{ matrix.python-version }} pytest

      - name: Install pip
        if: matrix.runner == 'ubuntu-24.04'
        run: |
          python3 -m ensurepip --upgrade
          ln -s $(which pip3) /usr/local/bin/pip

      - name: Upload coverage to Codecov
        if: matrix.runner == 'ubuntu-24.04'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: py/coverage.xml
          flags: python,py-${{ matrix.python-version }}
          fail_ci_if_error: false
          use_pypi: true
