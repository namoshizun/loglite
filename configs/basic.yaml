host: 0.0.0.0
port: 7788
debug: true
auto_rollout: true
log_table_name: Log
log_timestamp_field: timestamp
sse_limit: 1000
sse_debounce_ms: 500
vacuum_max_days: 7
vacuum_max_size: 100MB
vacuum_target_size: 80MB
sqlite_dir: ./db
sqlite_params:
  auto_vacuum: INCREMENTAL
  journal_mode: WAL
  synchronous: NORMAL
  temp_store: MEMORY
  cache_size: -50000  # 50MB
  mmap_size: 12582912  # 12MB
  busy_timeout: 5000

allow_origin: "*"
migrations:
  - version: 1
    rollout:
      - |
        CREATE TABLE Log (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            timestamp DATETIME NOT NULL,
            message TEXT NOT NULL,
            level TEXT NOT NULL CHECK (level IN ('DEBUG', 'INFO', 'WARNING', 'ERROR', 'CRITICAL')),
            service TEXT NOT NULL,
            filename TEXT,
            path TEXT,
            line INTEGER,
            function TEXT,
            pid INTEGER,
            process_name TEXT,
            extra JSON
        );
      - CREATE INDEX IF NOT EXISTS idx_timestamp ON Log(timestamp);
      - CREATE INDEX IF NOT EXISTS idx_level ON Log(level) WHERE level IN ('WARNING', 'ERROR', 'CRITICAL');
      - CREATE INDEX IF NOT EXISTS idx_service ON Log(service);
    rollback:
      - DROP INDEX IF EXISTS idx_service;
      - DROP INDEX IF EXISTS idx_level;
      - DROP INDEX IF EXISTS idx_timestamp;
      - DROP TABLE IF EXISTS Log;
