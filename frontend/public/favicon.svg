<svg xmlns="http://www.w3.org/2000/svg" width="360" height="313" viewBox="0 0 360 313">
  <defs>
    <!-- Flame gradients -->
    <linearGradient id="flameMain" x1="190" y1="12" x2="190" y2="194" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4141"/>
      <stop offset="0.38" stop-color="#ff7825"/>
      <stop offset="0.72" stop-color="#ffa70b"/>
      <stop offset="1" stop-color="#ffc018"/>
    </linearGradient>

    <linearGradient id="flameBase" x1="165" y1="165" x2="165" y2="197" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffba19"/>
      <stop offset="1" stop-color="#ff9700"/>
    </linearGradient>

    <!-- Log gradient -->
    <linearGradient id="logGrad" x1="23" y1="239" x2="294" y2="239" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b5748"/>
      <stop offset="0.18" stop-color="#765142"/>
      <stop offset="0.52" stop-color="#674333"/>
      <stop offset="0.82" stop-color="#5b3828"/>
      <stop offset="1" stop-color="#4f2f22"/>
    </linearGradient>

    <linearGradient id="logHighlight" x1="35" y1="204" x2="245" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a57d69" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#8c6250" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#4d3024" stop-opacity="0"/>
    </linearGradient>

    <!-- DB badge gradients -->
    <radialGradient id="badgeGrad" cx="283" cy="223" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26b8ff"/>
      <stop offset="0.55" stop-color="#159bea"/>
      <stop offset="1" stop-color="#0874bd"/>
    </radialGradient>

    <linearGradient id="badgeBottom" x1="296" y1="268" x2="296" y2="304" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0870ba" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#004f92" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="badgeShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Flame: rear/side glow -->
  <path
    d="
      M178.8 169.4
      C160.2 138.7 154.1 108.2 159.0 78.4
      C163.2 52.6 170.6 31.0 179.9 13.0
      C198.8 43.2 218.1 74.9 234.8 109.3
      C247.3 135.2 257.6 162.5 264.5 193.4
      L175.7 193.4
      C171.0 186.0 172.4 177.7 178.8 169.4
      Z"
    fill="url(#flameMain)"
  />

  <!-- Flame lower tongue -->
  <path
    d="
      M97.7 193.7
      C102.4 177.3 116.5 169.1 139.9 166.9
      C161.1 165.0 181.4 167.4 200.8 174.2
      C216.0 179.4 229.2 185.9 240.5 193.7
      Z"
    fill="url(#flameBase)"
  />

  <!-- Log -->
  <rect
    x="23"
    y="193"
    width="272"
    height="91"
    rx="45.5"
    fill="url(#logGrad)"
    filter="url(#softShadow)"
  />

  <!-- Subtle top highlight on log -->
  <path
    d="
      M68.5 193
      H252.5
      C275.9 193 295 212.1 295 235.5
      V235.5
      C295 237.3 294.9 239.0 294.7 240.7
      C265.2 221.8 217.3 210.2 154.1 210.2
      C92.4 210.2 50.7 220.1 24.0 239.8
      C23.3 236.4 23.0 233.0 23.0 229.5
      C23.0 209.3 39.4 193.0 68.5 193.0
      Z"
    fill="url(#logHighlight)"
  />

  <!-- DB circular badge -->
  <circle
    cx="296"
    cy="244"
    r="56"
    fill="url(#badgeGrad)"
    filter="url(#badgeShadow)"
  />

  <!-- Badge darker lower crescent -->
  <path
    d="
      M241.2 253.1
      C247.9 279.4 270.9 299.1 298.4 299.1
      C319.9 299.1 338.8 287.8 349.4 270.7
      C338.4 293.0 315.3 306.0 292.0 306.0
      C266.6 306.0 246.1 289.1 241.2 253.1
      Z"
    fill="url(#badgeBottom)"
    opacity="0.8"
  />

  <!-- Badge highlight -->
  <ellipse
    cx="280"
    cy="217"
    rx="29"
    ry="18"
    fill="#56c9ff"
    opacity="0.18"
  />

  <!-- db text -->
  <text
    x="259"
    y="269"
    font-family="Arial Black, Montserrat, Inter, Arial, sans-serif"
    font-size="56"
    font-weight="900"
    letter-spacing="-4"
    fill="#f5f3ed"
  >db</text>
</svg>